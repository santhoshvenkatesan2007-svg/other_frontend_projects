<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <title>To-do List</title>
</head>

<body>
    <style>
        * {
            font-family: "Poppins", sans-serif;
        }

        body {
            background:rgb(149, 220, 43);
            display:flex;
            flex-direction:row;
            justify-content:center;
            align-items:center;
        }

        input {
            width: 500px;
            height: 30px;
            border-radius: 10px;
        }

        .button1 {
            background-color:cyan;
            color: black;
            padding: 5px;
            width: 100px;
            height: 40px;
            border-radius: 10px;
            border: solid 1px white;
            margin:20px;
        }

        .button1:hover {
            background-color:lightsalmon;
            cursor: pointer;
        }

        .button2 {
            background-color:blue;
            color: white;
            font-size: large;
            font-style: bold;
            padding: 5px;
            width: 100px;
            height: 40px;
            border-radius: 10px;
            border: solid 1px white;
            margin:20px;
        }

        .button2:hover {
            background-color:orangered;
            cursor: pointer;
        }
    </style>
    <form>
        <table>
            <tr>
                <td><h1>To-Do List</h1></td>
            </tr>
            <tr>
                <td><h4>Add text - Click <u>Add</u> . To Delete - Click <u>Delete</u></h4></td>
            </tr>
            <tr>
                <td><input id="input" placeholder="Type your plans here..." class="input"> <button type='button' class='button1' onclick="add()">Add</button></td>
            </tr>
        </table>
    </form>
    
    <ul id="list-container">
        <li>
            This is the sample text <button type="button" class='button2' onclick='remove(event)'>Delete</button>
        </li>
    </ul>
</body>

</html>

<script>
    var input = document.querySelector("#input")
    var ul = document.getElementById("list-container")

    function add() {
        var listitem = document.createElement("li")
        listitem.innerHTML = input.value + "<button type='button' class='button2' onclick='remove(event)'>Delete</button>"
        ul.append(listitem)
    }

    function remove(event) {
        event.target.parentElement.remove()
    }
</script>
